name: Deploy Next.js to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install Node.js (The Chef)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Build the Website (Creates the 'out' folder)
      - name: Build
        run: npm run build

      # 5. Upload ONLY the 'out' folder to Hostinger
      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 86.38.202.111
          username: u224718941
          password: '41PY#a1GjTM*'
          
          # Target on Hostinger
          server-dir: public_html/chat/
          
          # Source: We only upload the BUILT version, not the source code
          local-dir: ./out/
          
          # Dangerous but necessary here: This cleans up old files so they don't clash
          strict: false
