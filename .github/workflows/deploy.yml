name: Deploy Next.js to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: swandigitals.com
          username: u224718941
          password: '41PY#a1GjTM*'
          
          # -----------------------------------------------------------
          # THE GOLDEN PATH (From your settings):
          # We skip the /home/u224718941/ part as FTP starts there automatically
          # -----------------------------------------------------------
          server-dir: domains/swandigitals.com/public_html/chat/
          
          # Source Folder
          local-dir: ./out/
          
         
